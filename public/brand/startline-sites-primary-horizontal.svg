<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">StartLine Sites primary horizontal lockup</title>
  <desc id="desc">Race-Club Crest SLS seal paired with the StartLine Sites wordmark.</desc>
  <defs>
    <style>
      .serif{font-family: Georgia, 'Times New Roman', Times, serif;}
      .sans{font-family: 'Plus Jakarta Sans', Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;}
    </style>
  </defs>
  <rect width="1200" height="360" fill="none"/>
  <g transform="translate(48 48) scale(.515625)">
    <circle cx="256" cy="256" r="240" fill="#FAFAF7"/>
    <circle cx="256" cy="256" r="229" fill="none" stroke="#FF4D3D" stroke-width="28"/>
    <circle cx="256" cy="256" r="202" fill="none" stroke="#0E1729" stroke-width="8"/>
    <circle cx="256" cy="256" r="170" fill="none" stroke="#F5C04A" stroke-width="3" stroke-dasharray="10 14" opacity=".9"/>
    <path d="M114 259c24-18 50-27 78-27 21 0 41 5 61 15 32 16 67 18 102 4 17-7 32-17 45-30" fill="none" stroke="#1FB8C4" stroke-width="9" stroke-linecap="round" opacity=".92"/>
